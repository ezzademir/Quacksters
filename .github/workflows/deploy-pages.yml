# Deploy Vite SPA to GitHub Pages (project site or USERNAME.github.io root).
# Repo Settings → Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Public project URL — used when VITE_SUPABASE_URL secret is unset (never put the anon key here).
      - name: Check Supabase anon secret
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning title=VITE_SUPABASE_ANON_KEY missing::Pages will ship without Supabase. Add repository secret VITE_SUPABASE_ANON_KEY (Dashboard → API → anon JWT, eyJ...). Optional: secret VITE_SUPABASE_URL to override the default project URL."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Compute VITE_BASE_PATH for GitHub Pages
        id: pages_base
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - name: Build SPA (Supabase URL defaults to Quacksters project)
        env:
          DEFAULT_VITE_SUPABASE_URL: https://oivsccsntugiprfdnypn.supabase.co
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: ${{ steps.pages_base.outputs.vite_base }}
        run: |
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-$DEFAULT_VITE_SUPABASE_URL}"
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
