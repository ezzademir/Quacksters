name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      # Root asset URLs so vite preview deep links like /login resolve ./assets → /assets (relative base breaks E2E).
      - run: npm run build
        env:
          VITE_BASE_PATH: /
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: true
